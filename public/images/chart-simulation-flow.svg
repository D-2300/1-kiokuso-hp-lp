<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Noto Sans JP', sans-serif">
  <rect width="800" height="480" fill="#F8F5F0" rx="12"/>

  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#333">記憶荘の物件探しの進め方</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" font-weight="400" fill="#999">シミュレーションから始める物件探し</text>

  <!-- Step 1 -->
  <g transform="translate(130, 110)">
    <rect x="-95" y="-30" width="190" height="80" fill="#fff" stroke="#4A6741" stroke-width="2" rx="10"/>
    <circle cx="-60" cy="10" r="18" fill="#4A6741"/>
    <text x="-60" y="16" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">1</text>
    <text x="15" y="2" text-anchor="middle" font-size="13" font-weight="700" fill="#4A6741">基準を整理</text>
    <text x="15" y="22" text-anchor="middle" font-size="11" fill="#666">客層・業態・予算</text>
    <text x="15" y="38" text-anchor="middle" font-size="11" fill="#666">設備条件をリスト化</text>
  </g>

  <!-- Arrow -->
  <line x1="230" y1="110" x2="270" y2="110" stroke="#4A6741" stroke-width="2"/>
  <polygon points="268,104 280,110 268,116" fill="#4A6741"/>

  <!-- Step 2 -->
  <g transform="translate(400, 110)">
    <rect x="-110" y="-30" width="220" height="80" fill="#fff" stroke="#4A6741" stroke-width="2" rx="10"/>
    <circle cx="-75" cy="10" r="18" fill="#4A6741"/>
    <text x="-75" y="16" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">2</text>
    <text x="20" y="-2" text-anchor="middle" font-size="13" font-weight="700" fill="#4A6741">シミュレーション</text>
    <text x="20" y="18" text-anchor="middle" font-size="11" fill="#666">工事費・初期費用・家賃を</text>
    <text x="20" y="36" text-anchor="middle" font-size="11" fill="#666">数字で検証→資料化</text>
  </g>

  <!-- Arrow -->
  <line x1="515" y1="110" x2="555" y2="110" stroke="#4A6741" stroke-width="2"/>
  <polygon points="553,104 565,110 553,116" fill="#4A6741"/>

  <!-- Step 3 -->
  <g transform="translate(670, 110)">
    <rect x="-100" y="-30" width="200" height="80" fill="#fff" stroke="#4A6741" stroke-width="2" rx="10"/>
    <circle cx="-65" cy="10" r="18" fill="#4A6741"/>
    <text x="-65" y="16" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">3</text>
    <text x="20" y="2" text-anchor="middle" font-size="13" font-weight="700" fill="#4A6741">相場をつかむ</text>
    <text x="20" y="22" text-anchor="middle" font-size="11" fill="#666">何件か比較して</text>
    <text x="20" y="38" text-anchor="middle" font-size="11" fill="#666">エリアの標準を把握</text>
  </g>

  <!-- Down arrow from step 3 -->
  <line x1="670" y1="162" x2="670" y2="200" stroke="#4A6741" stroke-width="2"/>
  <polygon points="664,198 670,210 676,198" fill="#4A6741"/>

  <!-- Step 4 -->
  <g transform="translate(670, 250)">
    <rect x="-100" y="-30" width="200" height="80" fill="#fff" stroke="#C9A84C" stroke-width="2.5" rx="10"/>
    <circle cx="-65" cy="10" r="18" fill="#C9A84C"/>
    <text x="-65" y="16" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">4</text>
    <text x="20" y="-2" text-anchor="middle" font-size="13" font-weight="700" fill="#C9A84C">ズレた物件を発見</text>
    <text x="20" y="18" text-anchor="middle" font-size="11" fill="#666">相場から外れた理由を</text>
    <text x="20" y="36" text-anchor="middle" font-size="11" fill="#666">自分で消化できるか判断</text>
  </g>

  <!-- Left arrow -->
  <line x1="565" y1="250" x2="525" y2="250" stroke="#C9A84C" stroke-width="2"/>
  <polygon points="527,244 515,250 527,256" fill="#C9A84C"/>

  <!-- Step 5 -->
  <g transform="translate(400, 250)">
    <rect x="-110" y="-30" width="220" height="80" fill="#fff" stroke="#C9A84C" stroke-width="2.5" rx="10"/>
    <circle cx="-75" cy="10" r="18" fill="#C9A84C"/>
    <text x="-75" y="16" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">5</text>
    <text x="20" y="-2" text-anchor="middle" font-size="13" font-weight="700" fill="#C9A84C">条件交渉</text>
    <text x="20" y="18" text-anchor="middle" font-size="11" fill="#666">家賃・敷金・フリーレント</text>
    <text x="20" y="36" text-anchor="middle" font-size="11" fill="#666">業種制限の緩和を交渉</text>
  </g>

  <!-- Left arrow -->
  <line x1="285" y1="250" x2="245" y2="250" stroke="#C9A84C" stroke-width="2"/>
  <polygon points="247,244 235,250 247,256" fill="#C9A84C"/>

  <!-- Step 6 -->
  <g transform="translate(130, 250)">
    <rect x="-95" y="-30" width="190" height="80" fill="#4A6741" stroke="#4A6741" stroke-width="2" rx="10"/>
    <text x="0" y="2" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">契約・着工</text>
    <text x="0" y="24" text-anchor="middle" font-size="11" fill="#A8BFA2">納得した条件で</text>
    <text x="0" y="40" text-anchor="middle" font-size="11" fill="#A8BFA2">スタートを切る</text>
  </g>

  <!-- Simulation detail box -->
  <rect x="60" y="350" width="680" height="110" fill="#fff" stroke="#4A6741" stroke-width="1.5" rx="10"/>
  <rect x="60" y="350" width="680" height="36" fill="#4A6741" rx="10"/>
  <rect x="60" y="370" width="680" height="16" fill="#4A6741"/>
  <text x="400" y="374" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">シミュレーションで検証する項目</text>

  <g transform="translate(90, 405)">
    <text x="0" y="0" font-size="12" fill="#333">□ 内装工事費はいくらかかるか</text>
    <text x="320" y="0" font-size="12" fill="#333">□ 設備条件は業態に対応できるか</text>
    <text x="0" y="24" font-size="12" fill="#333">□ 家賃+初期費用は予算に合うか</text>
    <text x="320" y="24" font-size="12" fill="#333">□ 足りない条件はいくらで解決できるか</text>
  </g>
</svg>