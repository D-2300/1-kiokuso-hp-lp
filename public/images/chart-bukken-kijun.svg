<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Noto Sans JP', sans-serif">
  <!-- Background -->
  <rect width="800" height="580" fill="#F8F5F0" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#333">物件探しの前に決める「3つの基準」</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" font-weight="400" fill="#999">3 Criteria to Set Before Property Search</text>

  <!-- Flow: Top to bottom -->

  <!-- Step 1: 事業の核 -->
  <g transform="translate(400, 110)">
    <rect x="-220" y="-30" width="440" height="110" fill="#fff" stroke="#8B3A3A" stroke-width="2" rx="10"/>
    <circle cx="-180" cy="25" r="22" fill="#8B3A3A"/>
    <text x="-180" y="31" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">1</text>
    <text x="-140" y="-5" font-size="15" font-weight="700" fill="#8B3A3A">事業の核を決める</text>
    <text x="-140" y="20" font-size="12" fill="#333">客層は誰か（年齢・性別・来店動機）</text>
    <text x="-140" y="40" font-size="12" fill="#333">提供スタイル（席数・客単価・回転率）</text>
    <text x="-140" y="60" font-size="12" fill="#333">集客方法（通行量 or SNS or デリバリー）</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(400, 200)">
    <polygon points="-8,0 8,0 0,16" fill="#999"/>
  </g>

  <!-- Step 2: エリア・予算 -->
  <g transform="translate(400, 260)">
    <rect x="-220" y="-30" width="440" height="110" fill="#fff" stroke="#4A7080" stroke-width="2" rx="10"/>
    <circle cx="-180" cy="25" r="22" fill="#4A7080"/>
    <text x="-180" y="31" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">2</text>
    <text x="-140" y="-5" font-size="15" font-weight="700" fill="#4A7080">エリアと予算を計算する</text>
    <text x="-140" y="20" font-size="12" fill="#333">ターゲットがいるエリアか（根拠を持つ）</text>
    <text x="-140" y="40" font-size="12" fill="#333">家賃上限＝月商の10%以内</text>
    <text x="-140" y="60" font-size="12" fill="#333">初期費用＋内装工事費＋運転資金のトータル</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(400, 350)">
    <polygon points="-8,0 8,0 0,16" fill="#999"/>
  </g>

  <!-- Step 3: 設備条件 -->
  <g transform="translate(400, 410)">
    <rect x="-220" y="-30" width="440" height="110" fill="#fff" stroke="#4A6741" stroke-width="2" rx="10"/>
    <circle cx="-180" cy="25" r="22" fill="#4A6741"/>
    <text x="-180" y="31" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">3</text>
    <text x="-140" y="-5" font-size="15" font-weight="700" fill="#4A6741">設備条件をリスト化する</text>
    <text x="-140" y="20" font-size="12" fill="#333">電気容量・給排水・ダクト・換気</text>
    <text x="-140" y="40" font-size="12" fill="#333">天井高・搬入経路・スケルトン or 居抜き</text>
    <text x="-140" y="60" font-size="12" fill="#333">→ これが「物件を見る/見ない」の判断基準に</text>
  </g>

  <!-- Bottom result box -->
  <rect x="120" y="535" width="560" height="34" fill="#4A6741" fill-opacity="0.1" rx="8"/>
  <text x="400" y="557" text-anchor="middle" font-size="13" font-weight="600" fill="#4A6741">この3つが決まってから物件を探す ＝ 判断が速く、失敗しない</text>
</svg>